name: Build index

on:
  push:
    branches: [main]
    paths-ignore:
      - index.html  # avoid re-triggering when the commit below is pushed

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate index.html
        run: python build_index.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: regenerate index.html [skip ci]"
          git push
