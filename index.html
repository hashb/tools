<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tools.chenna.me</title>
  <style>
    :root {
      --c-bg:        #fdfdfd;
      --c-bg2:       #f8f8f8;
      --c-text:      #333;
      --c-link:      #06c;
      --c-muted:     #666;
      --c-border:    #ddd;
      --c-focus-bg:  #f0f8ff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --c-bg:       #212121;
        --c-bg2:      #252525;
        --c-text:     #ddd;
        --c-link:     #8cc2dd;
        --c-muted:    #999;
        --c-border:   #444;
        --c-focus-bg: #2a2a2a;
      }
    }

    * { box-sizing: border-box; }

    body {
      font-family: Verdana, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      max-width: 720px;
      margin: 0 auto;
      padding: 20px;
      background: var(--c-bg);
      color: var(--c-text);
    }

    a { color: var(--c-link); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      border-bottom: 1px solid var(--c-border);
      margin-bottom: 1.5em;
      padding-bottom: 0.75em;
    }

    header h1 {
      margin: 0 0 0.2em;
      font-size: 1.5em;
    }

    header p {
      margin: 0;
      font-size: 0.875em;
      color: var(--c-muted);
    }

    #search {
      width: 100%;
      padding: 0.4em 0.6em;
      font-size: 1em;
      font-family: inherit;
      border: 1px solid var(--c-border);
      border-radius: 0.25em;
      background: var(--c-bg);
      color: var(--c-text);
      margin-bottom: 1em;
    }

    #search:focus {
      outline: none;
      border-color: var(--c-link);
      background: var(--c-focus-bg);
    }

    #count {
      font-size: 0.8em;
      color: var(--c-muted);
      margin-bottom: 1em;
    }

    ul#tool-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    ul#tool-list li {
      padding: 0.6em 0;
      border-bottom: 1px solid var(--c-border);
    }

    ul#tool-list li:last-child {
      border-bottom: none;
    }

    .tool-title {
      font-weight: bold;
    }

    .tool-desc {
      font-size: 0.85em;
      color: var(--c-muted);
      margin: 0.15em 0 0;
    }

    #no-results {
      display: none;
      color: var(--c-muted);
      font-size: 0.9em;
      margin-top: 1em;
    }
  </style>
</head>
<body>

<header>
  <h1><a href="/">tools.chenna.me</a></h1>
  <p>Assorted useful tools, almost entirely generated using LLMs</p>
</header>

<input id="search" type="search" placeholder="Search tools&hellip;" autofocus autocomplete="off">
<div id="count"></div>
<ul id="tool-list"></ul>
<p id="no-results">No tools match your search.</p>

<script>
const TOOLS = [
  {
    "slug": "plist-editor",
    "title": "Plist Editor",
    "description": "Upload an XML plist file to view and interactively edit its structure. The editor displays the full property list as an expandable tree where you can rename dict keys, change value types, edit values inline, and add or remove entries at any level. When finished, download the modified file as a valid",
    "url": "plist-editor.html"
  }
];

const list = document.getElementById('tool-list');
const countEl = document.getElementById('count');
const noResults = document.getElementById('no-results');
const searchInput = document.getElementById('search');

function render(tools) {
  list.innerHTML = '';
  tools.forEach(t => {
    const li = document.createElement('li');
    li.innerHTML =
      '<div class="tool-title"><a href="' + esc(t.url) + '">' + esc(t.title) + '</a></div>' +
      (t.description ? '<p class="tool-desc">' + esc(t.description) + '</p>' : '');
    list.appendChild(li);
  });
  const n = tools.length;
  countEl.textContent = n === TOOLS.length
    ? n + ' tool' + (n !== 1 ? 's' : '')
    : n + ' of ' + TOOLS.length + ' tool' + (TOOLS.length !== 1 ? 's' : '');
  noResults.style.display = n === 0 ? 'block' : 'none';
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function filter(q) {
  if (!q) return TOOLS;
  q = q.toLowerCase();
  return TOOLS.filter(t =>
    t.title.toLowerCase().includes(q) ||
    t.description.toLowerCase().includes(q) ||
    t.slug.toLowerCase().includes(q)
  );
}

searchInput.addEventListener('input', () => render(filter(searchInput.value.trim())));

render(TOOLS);
</script>
</body>
</html>
