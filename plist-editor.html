<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plist Editor</title>
    <style>
        * { box-sizing: border-box; }

        :root {
            --bg: #fdfdfd;
            --bg2: #f8f8f8;
            --text: #333;
            --text-muted: #888;
            --accent: #06c;
            --border: #ddd;
            --focus-bg: #f0f8ff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #212121;
                --bg2: #252525;
                --text: #ddd;
                --text-muted: #888;
                --accent: #8cc2dd;
                --border: #444;
                --focus-bg: #555;
            }
        }

        body {
            font-family: Verdana, sans-serif;
            max-width: 960px;
            margin: 0 auto;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        h1 { margin-top: 0; font-size: 24px; }
        p.subtitle { color: var(--text-muted); margin-top: -8px; }

        /* Drop zone */
        #dropzone {
            border: 1px dashed var(--border);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            background: var(--bg2);
            transition: border-color 0.2s, background 0.2s;
            color: var(--text-muted);
        }
        #dropzone:hover, #dropzone.drag-over {
            border-color: var(--accent);
            background: var(--focus-bg);
        }
        #dropzone strong { display: block; font-size: 15px; margin-bottom: 6px; color: var(--text); }
        #fileInput { display: none; }

        /* Error / info messages */
        .msg {
            padding: 10px 14px;
            margin-top: 14px;
            display: none;
            border-left: 3px solid var(--border);
        }
        .msg.visible { display: block; }
        .msg.error { color: #c0392b; border-left-color: #c0392b; background: var(--bg2); }
        .msg.info  { color: var(--accent); border-left-color: var(--accent); background: var(--bg2); }

        /* Editor panel */
        #editor-panel {
            display: none;
            margin-top: 20px;
            background: var(--bg);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        #editor-panel.visible { display: block; }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 8px;
        }
        .panel-header .filename {
            font-weight: 600;
            font-size: 13px;
            color: var(--text-muted);
            word-break: break-all;
        }
        .panel-header .actions { display: flex; gap: 8px; }

        button {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 6px 14px;
            border-radius: 0.25em;
            cursor: pointer;
            font-size: 13px;
            font-family: Verdana, sans-serif;
            transition: opacity 0.15s;
        }
        button:hover { opacity: 0.85; }
        button.secondary {
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
        }
        button.secondary:hover { background: var(--focus-bg); opacity: 1; }
        button.danger { background: #c0392b; }
        button.success { background: #27ae60; }

        /* Tree */
        #tree-container {
            padding: 10px 4px;
            overflow-x: auto;
        }

        .tree-node { margin: 0; padding: 0; }

        .node-row {
            display: flex;
            align-items: center;
            padding: 3px 6px;
            gap: 4px;
            min-height: 28px;
        }
        .node-row:hover { background: var(--bg2); }

        .indent { display: inline-block; width: 20px; flex-shrink: 0; }

        .toggle-btn {
            background: none;
            border: none;
            padding: 0 4px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 11px;
            width: 18px;
            flex-shrink: 0;
            line-height: 1;
        }
        .toggle-btn:hover { color: var(--text); background: none; opacity: 1; }
        .toggle-placeholder { width: 18px; flex-shrink: 0; }

        .node-key-wrap {
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 120px;
        }

        .key-input {
            font-size: 13px;
            font-family: monaco, monospace;
            font-weight: 600;
            color: var(--accent);
            border: 1px solid transparent;
            border-radius: 3px;
            padding: 2px 4px;
            background: transparent;
            min-width: 80px;
            max-width: 240px;
        }
        .key-input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg2);
        }

        .index-label {
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
            min-width: 30px;
        }

        .colon { color: var(--border); font-size: 13px; }

        .type-select {
            font-size: 12px;
            border: 1px solid var(--border);
            border-radius: 3px;
            padding: 2px 4px;
            background: var(--bg2);
            color: var(--text);
            cursor: pointer;
            font-family: Verdana, sans-serif;
        }
        .type-select:focus { outline: none; border-color: var(--accent); }

        .value-input {
            font-size: 13px;
            font-family: monaco, monospace;
            border: 1px solid transparent;
            border-radius: 3px;
            padding: 2px 6px;
            background: transparent;
            color: var(--text);
            flex: 1;
            min-width: 80px;
        }
        .value-input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--bg2);
        }
        .value-input.bool-val {
            max-width: 80px;
            cursor: pointer;
        }

        .container-label {
            font-size: 12px;
            color: var(--text-muted);
            font-style: italic;
        }

        .node-actions {
            display: flex;
            gap: 4px;
            margin-left: auto;
            flex-shrink: 0;
        }
        .node-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 1px 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            font-family: Verdana, sans-serif;
            line-height: 1.5;
        }
        .node-btn:hover { background: var(--bg2); color: var(--text); opacity: 1; }
        .node-btn.del:hover { color: #c0392b; border-color: #c0392b; background: var(--bg2); }

        .children-wrap { padding-left: 20px; }

        /* Add root controls */
        .add-root-bar {
            padding: 8px 16px 14px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .add-root-bar label { font-size: 13px; color: var(--text-muted); }

        @media (max-width: 600px) {
            body { padding: 10px; }
            h1 { font-size: 20px; }
            .panel-header { flex-direction: column; align-items: flex-start; }
            .key-input { max-width: 120px; }
        }
    </style>
</head>
<body>
    <h1>Plist Editor</h1>
    <p class="subtitle">Upload a plist file to view and edit its contents, then download the result.</p>

    <div id="dropzone">
        <strong>Drag &amp; drop a .plist file here</strong>
        or click to select a file
        <br><small style="margin-top:8px;display:block;color:#aaa">Supports XML and binary plist files (.plist)</small>
    </div>
    <input type="file" id="fileInput" accept=".plist,text/xml,application/xml">

    <div id="error-msg" class="msg error"></div>
    <div id="info-msg" class="msg info"></div>

    <div id="editor-panel">
        <div class="panel-header">
            <span class="filename" id="filename-label"></span>
            <div class="actions">
                <button class="secondary" id="load-another-btn">Load another file</button>
                <button class="success" id="download-btn">Download edited plist</button>
            </div>
        </div>
        <div id="tree-container"></div>
    </div>

    <script>
    // ─── Plist data model ──────────────────────────────────────────────────────
    // Each node: { type, value }
    // type: 'string' | 'integer' | 'real' | 'boolean' | 'date' | 'data' | 'dict' | 'array'
    // value for primitives: JS primitive
    // value for dict: [{ key: string, node: Node }, ...]  (ordered)
    // value for array: [Node, ...]

    // ─── XML plist parser ─────────────────────────────────────────────────────

    function parsePlistXML(xmlText) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(xmlText, 'application/xml');
        const parseError = doc.querySelector('parsererror');
        if (parseError) throw new Error('XML parse error: ' + parseError.textContent.split('\n')[0]);
        const plist = doc.querySelector('plist');
        if (!plist) throw new Error('No <plist> element found');
        const root = firstValueElement(plist);
        if (!root) throw new Error('Empty plist');
        return parseXMLElement(root);
    }

    function firstValueElement(parent) {
        for (const child of parent.childNodes) {
            if (child.nodeType === 1) return child;
        }
        return null;
    }

    function parseXMLElement(el) {
        const tag = el.tagName.toLowerCase();
        switch (tag) {
            case 'string':  return { type: 'string',  value: el.textContent };
            case 'integer': return { type: 'integer', value: parseInt(el.textContent, 10) };
            case 'real':    return { type: 'real',    value: parseFloat(el.textContent) };
            case 'true':    return { type: 'boolean', value: true };
            case 'false':   return { type: 'boolean', value: false };
            case 'date':    return { type: 'date',    value: el.textContent.trim() };
            case 'data':    return { type: 'data',    value: el.textContent.trim() };
            case 'dict': {
                const children = [...el.childNodes].filter(n => n.nodeType === 1);
                const pairs = [];
                for (let i = 0; i < children.length; i += 2) {
                    const keyEl = children[i];
                    const valEl = children[i + 1];
                    if (!keyEl || keyEl.tagName.toLowerCase() !== 'key') continue;
                    if (!valEl) continue;
                    pairs.push({ key: keyEl.textContent, node: parseXMLElement(valEl) });
                }
                return { type: 'dict', value: pairs };
            }
            case 'array': {
                const children = [...el.childNodes].filter(n => n.nodeType === 1);
                return { type: 'array', value: children.map(parseXMLElement) };
            }
            default:
                return { type: 'string', value: el.textContent };
        }
    }

    // ─── Binary plist parser (bplist00) ───────────────────────────────────────
    // Format reference: https://opensource.apple.com/source/CF/CF-550/CFBinaryPList.c

    function parseBinaryPlist(buffer) {
        const bytes = new Uint8Array(buffer);
        const dv = new DataView(buffer);
        const len = bytes.length;

        // Validate magic
        const magic = String.fromCharCode(...bytes.slice(0, 8));
        if (!magic.startsWith('bplist')) throw new Error('Not a binary plist');
        if (magic !== 'bplist00') {
            throw new Error(
                `Unsupported binary plist version "${magic.slice(6)}". ` +
                `Only bplist00 is supported. If this is an NSKeyedArchiver archive (bplist15/16), ` +
                `convert it with: plutil -convert xml1 file.plist`
            );
        }
        if (len < 40) throw new Error('File too small to be a valid binary plist');

        // 32-byte trailer at end of file
        // Offset from end: [0-5] padding, [6] sortVersion, [7] offsetIntSize,
        //   [8] objectRefSize, [9-16] numObjects, [17-24] topObject, [25-32] offsetTableOffset
        const t = len - 32;
        const offsetIntSize  = bytes[t + 6];
        const objectRefSize  = bytes[t + 7];
        const numObjects     = readUint64(dv, t + 8);
        const topObject      = readUint64(dv, t + 16);
        const offsetTableOff = readUint64(dv, t + 24);

        if (offsetIntSize === 0 || objectRefSize === 0) throw new Error('Invalid binary plist trailer');

        // Build offset table
        const offsets = new Array(numObjects);
        for (let i = 0; i < numObjects; i++) {
            offsets[i] = readUintN(dv, offsetTableOff + i * offsetIntSize, offsetIntSize);
        }

        // Parse objects, caching to handle shared references
        const cache = new Map();

        function parseObject(idx) {
            if (cache.has(idx)) {
                // Deep-clone cached node so edits on one reference don't bleed into others
                return deepClone(cache.get(idx));
            }
            const node = parseAtOffset(offsets[idx]);
            cache.set(idx, node);
            return node;
        }

        function readCountAndStart(offset, info) {
            // info < 0xf  → count = info, data starts at offset+1
            // info == 0xf → count stored as next integer object
            if (info !== 0xf) return [info, offset + 1];
            const intMarker = bytes[offset + 1];
            const intByteCount = 1 << (intMarker & 0x0f);
            let count = 0;
            for (let i = 0; i < intByteCount; i++) count = count * 256 + bytes[offset + 2 + i];
            return [count, offset + 2 + intByteCount];
        }

        function parseAtOffset(offset) {
            const marker = bytes[offset];
            const objType = (marker & 0xf0) >> 4;
            const info    =  marker & 0x0f;

            switch (objType) {
                case 0x0: { // singleton
                    if (info === 8) return { type: 'boolean', value: false };
                    if (info === 9) return { type: 'boolean', value: true };
                    return { type: 'string', value: '' }; // null / fill
                }
                case 0x1: { // integer
                    const bc = 1 << info;
                    const v = readSintN(dv, offset + 1, bc);
                    return { type: 'integer', value: v };
                }
                case 0x2: { // real
                    if (info === 2) return { type: 'real', value: dv.getFloat32(offset + 1, false) };
                    return { type: 'real', value: dv.getFloat64(offset + 1, false) };
                }
                case 0x3: { // date (CF absolute time: seconds since 2001-01-01)
                    const cf = dv.getFloat64(offset + 1, false);
                    const unix = (cf + 978307200) * 1000;
                    const iso = new Date(unix).toISOString().replace('.000Z', 'Z');
                    return { type: 'date', value: iso };
                }
                case 0x4: { // data
                    const [count, start] = readCountAndStart(offset, info);
                    const b64 = uint8ToBase64(bytes.subarray(start, start + count));
                    return { type: 'data', value: b64 };
                }
                case 0x5: { // ASCII string
                    const [count, start] = readCountAndStart(offset, info);
                    let s = '';
                    for (let i = 0; i < count; i++) s += String.fromCharCode(bytes[start + i]);
                    return { type: 'string', value: s };
                }
                case 0x6: { // UTF-16 BE string
                    const [count, start] = readCountAndStart(offset, info);
                    const u16 = new Uint16Array(count);
                    for (let i = 0; i < count; i++) {
                        u16[i] = (bytes[start + i * 2] << 8) | bytes[start + i * 2 + 1];
                    }
                    return { type: 'string', value: String.fromCharCode(...u16) };
                }
                case 0x8: { // UID (NSKeyedArchiver) — represent as {CF$UID: integer}
                    const uid = readUintN(dv, offset + 1, info + 1);
                    return { type: 'dict', value: [{ key: 'CF$UID', node: { type: 'integer', value: uid } }] };
                }
                case 0xa:   // array
                case 0xb:   // ordered set (treat as array)
                case 0xc: { // set (treat as array)
                    const [count, start] = readCountAndStart(offset, info);
                    const items = [];
                    for (let i = 0; i < count; i++) {
                        const ref = readUintN(dv, start + i * objectRefSize, objectRefSize);
                        items.push(parseObject(ref));
                    }
                    return { type: 'array', value: items };
                }
                case 0xd: { // dict
                    const [count, start] = readCountAndStart(offset, info);
                    const pairs = [];
                    for (let i = 0; i < count; i++) {
                        const kRef = readUintN(dv, start + i * objectRefSize, objectRefSize);
                        const vRef = readUintN(dv, start + (count + i) * objectRefSize, objectRefSize);
                        const kNode = parseObject(kRef);
                        const vNode = parseObject(vRef);
                        const key = kNode.type === 'string' ? kNode.value : String(kNode.value);
                        pairs.push({ key, node: vNode });
                    }
                    return { type: 'dict', value: pairs };
                }
                default:
                    return { type: 'string', value: `<unsupported type 0x${objType.toString(16)}>` };
            }
        }

        return parseObject(topObject);
    }

    // ─── Binary parser helpers ────────────────────────────────────────────────

    function readUintN(dv, offset, size) {
        let val = 0;
        for (let i = 0; i < size; i++) val = val * 256 + dv.getUint8(offset + i);
        return val;
    }

    function readSintN(dv, offset, size) {
        if (size === 1) return dv.getInt8(offset);
        if (size === 2) return dv.getInt16(offset, false);
        if (size === 4) return dv.getInt32(offset, false);
        if (size === 8) {
            const hi = dv.getInt32(offset, false);
            const lo = dv.getUint32(offset + 4, false);
            return hi * 0x100000000 + lo;
        }
        return readUintN(dv, offset, size);
    }

    function readUint64(dv, offset) {
        const hi = dv.getUint32(offset, false);
        const lo = dv.getUint32(offset + 4, false);
        return hi * 0x100000000 + lo;
    }

    function uint8ToBase64(bytes) {
        let binary = '';
        const chunk = 8192;
        for (let i = 0; i < bytes.length; i += chunk) {
            binary += String.fromCharCode(...bytes.subarray(i, i + chunk));
        }
        return btoa(binary);
    }

    function deepClone(node) {
        if (node.type === 'dict') {
            return { type: 'dict', value: node.value.map(p => ({ key: p.key, node: deepClone(p.node) })) };
        }
        if (node.type === 'array') {
            return { type: 'array', value: node.value.map(deepClone) };
        }
        return { ...node };
    }

    // ─── Serialise back to XML plist ──────────────────────────────────────────

    function serializePlist(rootNode) {
        const lines = [
            '<?xml version="1.0" encoding="UTF-8"?>',
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">',
            '<plist version="1.0">',
            serializeNode(rootNode, 0),
            '</plist>',
        ];
        return lines.join('\n') + '\n';
    }

    function indent(depth) { return '\t'.repeat(depth); }

    function escapeXML(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function serializeNode(node, depth) {
        const d = indent(depth);
        switch (node.type) {
            case 'string':  return `${d}<string>${escapeXML(node.value)}</string>`;
            case 'integer': return `${d}<integer>${parseInt(node.value)||0}</integer>`;
            case 'real': {
                let v = parseFloat(node.value);
                if (isNaN(v)) v = 0;
                return `${d}<real>${v}</real>`;
            }
            case 'boolean': return node.value ? `${d}<true/>` : `${d}<false/>`;
            case 'date':    return `${d}<date>${escapeXML(node.value)}</date>`;
            case 'data':    return `${d}<data>${escapeXML(node.value)}</data>`;
            case 'dict': {
                if (!node.value.length) return `${d}<dict/>`;
                const inner = node.value.map(({ key, node: child }) =>
                    `${indent(depth+1)}<key>${escapeXML(key)}</key>\n${serializeNode(child, depth+1)}`
                ).join('\n');
                return `${d}<dict>\n${inner}\n${d}</dict>`;
            }
            case 'array': {
                if (!node.value.length) return `${d}<array/>`;
                const inner = node.value.map(child => serializeNode(child, depth+1)).join('\n');
                return `${d}<array>\n${inner}\n${d}</array>`;
            }
            default: return `${d}<string>${escapeXML(String(node.value))}</string>`;
        }
    }

    // ─── UI rendering ─────────────────────────────────────────────────────────

    let rootNode = null;
    let currentFilename = 'edited.plist';

    function renderTree() {
        const container = document.getElementById('tree-container');
        container.innerHTML = '';
        if (!rootNode) return;

        // Show add-to-root bar only when root is dict/array
        const wrap = document.createElement('div');
        wrap.appendChild(buildNodeEl(rootNode, null, null, 0));

        // Add-item bar for the root node if it's a container
        if (rootNode.type === 'dict' || rootNode.type === 'array') {
            wrap.appendChild(buildAddBar(rootNode));
        }

        container.appendChild(wrap);
    }

    // Build DOM for a single node (recursive)
    // parent: the parent node (for deletion), parentKey: dict key or array index, depth: int
    function buildNodeEl(node, parent, parentKey, depth) {
        const outer = document.createElement('div');
        outer.className = 'tree-node';

        const row = document.createElement('div');
        row.className = 'node-row';

        // Indentation
        for (let i = 0; i < depth; i++) {
            const sp = document.createElement('span');
            sp.className = 'indent';
            row.appendChild(sp);
        }

        // Toggle button for containers
        if (node.type === 'dict' || node.type === 'array') {
            const toggle = document.createElement('button');
            toggle.className = 'toggle-btn';
            toggle.title = 'Collapse/expand';
            toggle.textContent = '▾';
            let collapsed = false;
            toggle.addEventListener('click', () => {
                collapsed = !collapsed;
                childrenWrap.style.display = collapsed ? 'none' : '';
                toggle.textContent = collapsed ? '▸' : '▾';
            });
            row.appendChild(toggle);
        } else {
            const ph = document.createElement('span');
            ph.className = 'toggle-placeholder';
            row.appendChild(ph);
        }

        // Key or index label
        if (parent && parent.type === 'dict') {
            const keyWrap = document.createElement('span');
            keyWrap.className = 'node-key-wrap';
            const keyInput = document.createElement('input');
            keyInput.className = 'key-input';
            keyInput.type = 'text';
            keyInput.value = parentKey;
            keyInput.title = 'Edit key name';
            keyInput.addEventListener('change', () => {
                const pair = parent.value.find(p => p.key === parentKey);
                if (pair) {
                    pair.key = keyInput.value;
                    parentKey = keyInput.value;
                }
            });
            keyWrap.appendChild(keyInput);
            row.appendChild(keyWrap);

            const colon = document.createElement('span');
            colon.className = 'colon';
            colon.textContent = ':';
            row.appendChild(colon);
        } else if (parent && parent.type === 'array') {
            const lbl = document.createElement('span');
            lbl.className = 'index-label';
            lbl.textContent = `[${parentKey}]`;
            row.appendChild(lbl);
        }

        // Type selector
        const typeSelect = document.createElement('select');
        typeSelect.className = 'type-select';
        const types = ['string', 'integer', 'real', 'boolean', 'date', 'data', 'dict', 'array'];
        types.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t;
            opt.textContent = t;
            if (t === node.type) opt.selected = true;
            typeSelect.appendChild(opt);
        });
        typeSelect.addEventListener('change', () => {
            const newType = typeSelect.value;
            if (newType === node.type) return;
            // Convert value
            const oldNode = { ...node };
            node.type = newType;
            if (newType === 'dict') {
                node.value = [];
            } else if (newType === 'array') {
                node.value = [];
            } else if (newType === 'boolean') {
                node.value = false;
            } else if (newType === 'integer') {
                node.value = parseInt(oldNode.value) || 0;
            } else if (newType === 'real') {
                node.value = parseFloat(oldNode.value) || 0.0;
            } else {
                node.value = String(oldNode.value !== undefined ? oldNode.value : '');
            }
            renderTree();
        });
        row.appendChild(typeSelect);

        // Value editor
        if (node.type === 'dict') {
            const lbl = document.createElement('span');
            lbl.className = 'container-label';
            lbl.textContent = `{${node.value.length} ${node.value.length === 1 ? 'key' : 'keys'}}`;
            row.appendChild(lbl);
        } else if (node.type === 'array') {
            const lbl = document.createElement('span');
            lbl.className = 'container-label';
            lbl.textContent = `[${node.value.length} ${node.value.length === 1 ? 'item' : 'items'}]`;
            row.appendChild(lbl);
        } else if (node.type === 'boolean') {
            const sel = document.createElement('select');
            sel.className = 'value-input bool-val';
            ['true', 'false'].forEach(v => {
                const opt = document.createElement('option');
                opt.value = v;
                opt.textContent = v;
                if ((v === 'true') === node.value) opt.selected = true;
                sel.appendChild(opt);
            });
            sel.addEventListener('change', () => { node.value = sel.value === 'true'; });
            row.appendChild(sel);
        } else {
            const valInput = document.createElement('input');
            valInput.className = 'value-input';
            valInput.type = node.type === 'integer' || node.type === 'real' ? 'text' : 'text';
            valInput.value = node.value !== undefined ? String(node.value) : '';
            valInput.placeholder = node.type;
            valInput.addEventListener('input', () => {
                if (node.type === 'integer') node.value = parseInt(valInput.value) || 0;
                else if (node.type === 'real') node.value = parseFloat(valInput.value) || 0;
                else node.value = valInput.value;
            });
            row.appendChild(valInput);
        }

        // Node actions (delete)
        const actions = document.createElement('span');
        actions.className = 'node-actions';

        if (parent) {
            const delBtn = document.createElement('button');
            delBtn.className = 'node-btn del';
            delBtn.textContent = '✕';
            delBtn.title = 'Delete this item';
            delBtn.addEventListener('click', () => {
                if (parent.type === 'dict') {
                    parent.value = parent.value.filter(p => p.key !== parentKey);
                } else if (parent.type === 'array') {
                    parent.value.splice(parentKey, 1);
                }
                renderTree();
            });
            actions.appendChild(delBtn);
        }

        row.appendChild(actions);
        outer.appendChild(row);

        // Children for containers
        if (node.type === 'dict' || node.type === 'array') {
            const childrenWrap = document.createElement('div');
            childrenWrap.className = 'children-wrap';

            if (node.type === 'dict') {
                node.value.forEach(({ key, node: child }) => {
                    childrenWrap.appendChild(buildNodeEl(child, node, key, depth + 1));
                });
            } else {
                node.value.forEach((child, idx) => {
                    childrenWrap.appendChild(buildNodeEl(child, node, idx, depth + 1));
                });
            }

            // Add-item bar inside container (re-render for new items)
            childrenWrap.appendChild(buildAddBar(node, depth + 1));

            outer.appendChild(childrenWrap);

            // Store reference for toggle
            outer._childrenWrap = childrenWrap;
        }

        return outer;
    }

    function buildAddBar(node, depth) {
        const bar = document.createElement('div');
        bar.className = 'add-root-bar';

        if (node.type === 'dict') {
            const keyInput = document.createElement('input');
            keyInput.type = 'text';
            keyInput.placeholder = 'new key';
            keyInput.style.cssText = 'font-size:13px;border:1px solid #ddd;border-radius:4px;padding:4px 8px;width:140px;';

            const typeSelect = document.createElement('select');
            typeSelect.className = 'type-select';
            ['string', 'integer', 'real', 'boolean', 'date', 'data', 'dict', 'array'].forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                typeSelect.appendChild(opt);
            });

            const addBtn = document.createElement('button');
            addBtn.textContent = '+ Add key';
            addBtn.style.fontSize = '12px';
            addBtn.addEventListener('click', () => {
                let key = keyInput.value.trim() || 'NewKey';
                // Avoid duplicate keys
                let suffix = 1;
                let candidate = key;
                while (node.value.find(p => p.key === candidate)) {
                    candidate = `${key}_${suffix++}`;
                }
                node.value.push({ key: candidate, node: defaultNode(typeSelect.value) });
                keyInput.value = '';
                renderTree();
            });

            bar.appendChild(keyInput);
            bar.appendChild(typeSelect);
            bar.appendChild(addBtn);
        } else if (node.type === 'array') {
            const typeSelect = document.createElement('select');
            typeSelect.className = 'type-select';
            ['string', 'integer', 'real', 'boolean', 'date', 'data', 'dict', 'array'].forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                typeSelect.appendChild(opt);
            });

            const addBtn = document.createElement('button');
            addBtn.textContent = '+ Add item';
            addBtn.style.fontSize = '12px';
            addBtn.addEventListener('click', () => {
                node.value.push(defaultNode(typeSelect.value));
                renderTree();
            });

            bar.appendChild(typeSelect);
            bar.appendChild(addBtn);
        }

        return bar;
    }

    function defaultNode(type) {
        switch (type) {
            case 'string':  return { type: 'string',  value: '' };
            case 'integer': return { type: 'integer', value: 0 };
            case 'real':    return { type: 'real',    value: 0.0 };
            case 'boolean': return { type: 'boolean', value: false };
            case 'date':    return { type: 'date',    value: new Date().toISOString().replace('.000', '') };
            case 'data':    return { type: 'data',    value: '' };
            case 'dict':    return { type: 'dict',    value: [] };
            case 'array':   return { type: 'array',   value: [] };
            default:        return { type: 'string',  value: '' };
        }
    }

    // ─── File loading ─────────────────────────────────────────────────────────

    function loadFile(file) {
        hideMessages();
        const reader = new FileReader();
        reader.onload = (e) => {
            const buffer = e.target.result;
            const bytes = new Uint8Array(buffer);

            // Detect format from magic bytes
            const magic = String.fromCharCode(bytes[0], bytes[1], bytes[2], bytes[3],
                                              bytes[4], bytes[5], bytes[6], bytes[7]);
            const isBinary = magic.startsWith('bplist');

            try {
                if (isBinary) {
                    rootNode = parseBinaryPlist(buffer);
                    showInfo('Binary plist loaded. Editing and downloading as XML plist.');
                } else {
                    const text = new TextDecoder().decode(buffer);
                    rootNode = parsePlistXML(text);
                }
                currentFilename = file.name;
                document.getElementById('filename-label').textContent = file.name;
                document.getElementById('editor-panel').classList.add('visible');
                renderTree();
            } catch (err) {
                showError('Failed to parse plist: ' + err.message);
            }
        };
        reader.onerror = () => showError('Failed to read file.');
        reader.readAsArrayBuffer(file);
    }

    // ─── Download ─────────────────────────────────────────────────────────────

    document.getElementById('download-btn').addEventListener('click', () => {
        if (!rootNode) return;
        const xml = serializePlist(rootNode);
        const blob = new Blob([xml], { type: 'application/xml' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = currentFilename;
        a.click();
        URL.revokeObjectURL(url);
    });

    document.getElementById('load-another-btn').addEventListener('click', () => {
        document.getElementById('fileInput').click();
    });

    // ─── Drag & drop / file input ─────────────────────────────────────────────

    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');

    dropzone.addEventListener('click', () => fileInput.click());

    dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.classList.add('drag-over');
    });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file) loadFile(file);
    });

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) loadFile(file);
    });

    // ─── Helpers ──────────────────────────────────────────────────────────────

    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.classList.add('visible');
    }

    function showInfo(msg) {
        const el = document.getElementById('info-msg');
        el.textContent = msg;
        el.classList.add('visible');
    }

    function hideMessages() {
        document.getElementById('error-msg').classList.remove('visible');
        document.getElementById('info-msg').classList.remove('visible');
    }
    </script>
</body>
</html>
